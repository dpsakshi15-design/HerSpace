<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7aaa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="HerSpace" />
  <meta name="description" content="Your personal wellness & self-care companion" />

  <title>HerSpace 🌸</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Dancing+Script:wght@500;700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    #root { height: 100%; }
    body { background: #fdf0f5; font-family: 'Nunito', sans-serif; }

    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #fff5f9 0%, #fdf8f2 45%, #f8f4ff 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .load-logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #ff7aaa, #ff5090);
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(255, 80, 144, 0.35);
      margin-bottom: 20px;
      animation: floatLoad 2s ease-in-out infinite;
    }
    .load-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #b02050; letter-spacing: -0.5px; }
    .load-sub { font-family: 'Dancing Script', cursive; font-size: 16px; color: #e88aaa; margin-top: 6px; }
    .load-dots { display: flex; gap: 6px; margin-top: 24px; }
    .load-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff85a1; animation: dotBounce 1.2s ease-in-out infinite; }
    .load-dot:nth-child(2) { animation-delay: 0.2s; }
    .load-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes floatLoad { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    @keyframes dotBounce { 0%,100%{transform:translateY(0);opacity:0.4;} 50%{transform:translateY(-8px);opacity:1;} }

    #install-banner {
      display: none;
      position: fixed;
      bottom: 90px; left: 12px; right: 12px;
      background: linear-gradient(135deg, #ff7aaa, #ff5090);
      color: white; padding: 14px 16px; border-radius: 20px;
      box-shadow: 0 8px 28px rgba(255, 80, 144, 0.4);
      z-index: 9999; flex-direction: row; align-items: center; gap: 10px;
      font-family: 'Nunito', sans-serif;
    }
    #install-banner.show { display: flex; }
    #install-banner p { font-size: 13px; font-weight: 700; flex: 1; line-height: 1.4; }
    #install-banner p span { display: block; font-size: 11px; font-weight: 500; opacity: 0.88; margin-top: 2px; }
    #install-btn { background: white; color: #e05080; border: none; padding: 8px 14px; border-radius: 12px; font-weight: 800; font-size: 12px; cursor: pointer; font-family: 'Nunito', sans-serif; white-space: nowrap; }
    #dismiss-btn { background: rgba(255,255,255,0.25); border: none; color: white; width: 26px; height: 26px; border-radius: 50%; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="load-logo">🌸</div>
    <div class="load-title">HerSpace</div>
    <div class="load-sub">your safe space ✨</div>
    <div class="load-dots">
      <div class="load-dot"></div>
      <div class="load-dot"></div>
      <div class="load-dot"></div>
    </div>
  </div>

  <div id="install-banner">
    <p>🌸 Install HerSpace App <span>Add to home screen for full experience</span></p>
    <button id="install-btn">Install</button>
    <button id="dismiss-btn">✕</button>
  </div>

  <div id="root"></div>

  <!-- React + Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HerSpace App — NO data-type="module" -->
  <script type="text/babel" src="HerSpaceV2.jsx"></script>

  <script>
    function mountApp() {
      if (window.App && document.getElementById('root')) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.App));
        const loading = document.getElementById('loading');
        if (loading) {
          loading.classList.add('hide');
          setTimeout(() => loading.remove(), 500);
        }
      } else {
        setTimeout(mountApp, 100);
      }
    }

    window.addEventListener('load', () => setTimeout(mountApp, 500));

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    const banner = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => banner.classList.add('show'), 3000);
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.remove('show');
    });

    document.getElementById('dismiss-btn').addEventListener('click', () => {
      banner.classList.remove('show');
    });
  </script>

</body>
</html>
